name: Kirim Voice Note Ulang Tahun (Jam 10 Pagi)

on:
  schedule:
    # Menjalankan pada pukul 03:00 UTC setiap hari.
    # Ini setara dengan jam 10:00 WIB.
    # - cron: '0 3 * * *'
  # Baris di bawah ini agar bisa dijalankan manual juga untuk tes
  workflow_dispatch:

jobs:
  send_birthday_voice_note:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Mengambil kode dari repositori
      - name: Checkout repository
        uses: actions/checkout@v3

      # Langkah 2: Menyiapkan lingkungan PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1' # Bisa disesuaikan versinya

      # Langkah 3: Menjalankan skrip PHP (MODE: VOICE_ONLY)
      - name: Run PHP script - Send Voice Note (VOICE_ONLY MODE)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MODE: VOICE_ONLY
        run: php cek_ultah.php
